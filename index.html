<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover,user-scalable=no,maximum-scale=1">
<title>小鱼健康</title>

<!-- PWA Meta Tags -->
<meta name="theme-color" content="#C8694A">
<meta name="description" content="个人健康管理应用，记录BMI、健康状态和养生习惯">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="小鱼健康">
<meta name="mobile-web-app-capable" content="yes">
<meta name="application-name" content="小鱼健康">
<meta name="msapplication-TileColor" content="#C8694A">
<meta name="msapplication-tap-highlight" content="no">

<!-- PWA Manifest -->
<link rel="manifest" href="./manifest.json">

<!-- Apple Touch Icons -->
<link rel="apple-touch-icon" href="./icons/icon-152.png">
<link rel="apple-touch-icon" sizes="72x72" href="./icons/icon-72.png">
<link rel="apple-touch-icon" sizes="96x96" href="./icons/icon-96.png">
<link rel="apple-touch-icon" sizes="128x128" href="./icons/icon-128.png">
<link rel="apple-touch-icon" sizes="144x144" href="./icons/icon-144.png">
<link rel="apple-touch-icon" sizes="152x152" href="./icons/icon-152.png">
<link rel="apple-touch-icon" sizes="192x192" href="./icons/icon-192.png">
<link rel="apple-touch-icon" sizes="384x384" href="./icons/icon-384.png">
<link rel="apple-touch-icon" sizes="512x512" href="./icons/icon-512.png">

<!-- Favicon -->
<link rel="icon" type="image/png" sizes="32x32" href="./icons/icon-32.png">
<link rel="icon" type="image/png" sizes="16x16" href="./icons/icon-16.png">

<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
:root{
  --coral:#C8694A;--coral-light:#F5EDE6;
  --brown:#5C3420;--brown-mid:#8B5C40;--brown-light:#C4A090;
  --border:#EDD5C0;--bg:#FDFAF7;--bg2:#F5EDE6;
  --green:#2E7D52;--red:#C0392B;--amber:#BA7517;--blue:#185FA5;
  --sat:env(safe-area-inset-top,0px);
  --sab:env(safe-area-inset-bottom,0px);
}
html,body{width:100%;height:100%;height:100dvh;margin:0;padding:0;overflow:hidden;}
body{font-family:-apple-system,BlinkMacSystemFont,'SF Pro Text','Helvetica Neue',sans-serif;background:var(--bg);color:var(--brown);display:flex;flex-direction:column;overflow:hidden;position:fixed;inset:0;}
.phone{width:100%;height:100%;height:100dvh;background:var(--bg);overflow:hidden;display:flex;flex-direction:column;position:relative;flex:1;padding-top:env(safe-area-inset-top);padding-top:constant(safe-area-inset-top);max-height:100%;max-height:100dvh;}
.screen{display:none;flex:1;flex-direction:column;overflow-y:auto;padding-bottom:calc(50px + env(safe-area-inset-bottom));padding-bottom:calc(50px + constant(safe-area-inset-bottom));-webkit-overflow-scrolling:touch;overscroll-behavior-y:contain;}
.screen.active{display:flex;}

/* header */
.hdr-coral{background:var(--coral);padding:12px 16px 10px;flex-shrink:0;display:flex;justify-content:space-between;align-items:center;}
.hdr-left{flex:1;}
.hdr-coral .brand{font-size:10px;color:rgba(255,255,255,.6);letter-spacing:.04em;}
.hdr-coral .title{font-size:20px;font-weight:700;color:#fff;margin-top:2px;}
.hdr-coral .sub{font-size:12px;color:rgba(255,255,255,.7);margin-top:1px;}
.user-info{font-size:12px;color:rgba(255,255,255,.85);text-align:right;flex-shrink:0;}
.user-info .name{font-weight:600;font-size:13px;color:#fff;}
.user-info .switch{font-size:11px;color:rgba(255,255,255,.7);cursor:pointer;margin-top:4px;}

.hdr-white{background:var(--bg);padding:12px 16px 10px;border-bottom:.5px solid var(--border);flex-shrink:0;}
.hdr-white .title{font-size:20px;font-weight:600;color:var(--brown);}

/* week strip */
.week-strip{display:flex;gap:6px;padding:10px 16px;background:var(--bg2);overflow-x:auto;flex-shrink:0;}
.week-strip::-webkit-scrollbar{display:none;}
.wtab{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px;font-size:11px;color:var(--brown-mid);padding:6px 14px;border-radius:16px;cursor:pointer;white-space:nowrap;border:none;background:transparent;min-width:60px;height:48px;}
.wtab-main{font-weight:500;font-size:12px;line-height:1.2;}
.wtab-range{font-size:9px;color:var(--brown-light);line-height:1;}
.wtab.on{background:var(--coral);color:#fff;}
.wtab.on .wtab-main{font-weight:700;font-size:13px;line-height:1.2;}
.wtab.on .wtab-range{font-size:9px;color:rgba(255,255,255,.85);line-height:1;}

/* body */

.sbody{padding:14px 16px 20px;-webkit-flex:1;flex:1;min-height:0;}
.sec-label{font-size:10px;font-weight:600;color:var(--coral);letter-spacing:.06em;text-transform:uppercase;margin:14px 0 8px;}
.sec-label:first-child{margin-top:0;}

/* cards */
.card{background:#fff;border-radius:14px;border:.5px solid var(--border);margin-bottom:10px;overflow:hidden;}
.card-hdr{display:flex;justify-content:space-between;align-items:center;padding:11px 14px;}
.card-hdr-title{font-size:13px;font-weight:600;color:var(--brown);}
.card-body{padding:0 14px 10px;}
.chevron{font-size:14px;color:var(--brown-light);cursor:pointer;transition:transform .2s;display:inline-block;}
.chevron.open{transform:rotate(180deg);}

/* health sub rows */
.sub-row{border-top:.5px solid var(--bg2);padding:8px 0;}
.sub-name{font-size:12px;font-weight:600;color:var(--brown-mid);margin-bottom:8px;}
.pills-row{display:flex;gap:4px;}
.pill-item{display:flex;flex-direction:column;align-items:center;gap:5px;flex:1;cursor:pointer;}
.np{width:34px;height:34px;border-radius:50%;border:1.5px solid var(--border);display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:600;color:var(--brown-light);background:#fff;transition:all .15s;flex-shrink:0;}
.np.a1{background:var(--green);border-color:var(--green);color:#fff;}
.np.a2{background:#E67E00;border-color:#E67E00;color:#fff;}
.np.a3{background:#CC5500;border-color:#CC5500;color:#fff;}
.np.a4{background:var(--red);border-color:var(--red);color:#fff;}
.pill-label{font-size:10px;white-space:nowrap;color:var(--brown-light);}
.pill-label.a1{color:var(--green);font-weight:600;}
.pill-label.a2{color:#E67E00;font-weight:600;}
.pill-label.a3{color:#CC5500;font-weight:600;}
.pill-label.a4{color:var(--red);font-weight:600;}

/* habit */
.habit-row{display:flex;align-items:center;justify-content:space-between;padding:9px 14px;border-top:.5px solid var(--bg2);}
.habit-row:first-child{border-top:none;}
.habit-name{font-size:12px;color:var(--brown-mid);}
.hbtns{display:flex;gap:6px;}
.hbtn{width:30px;height:30px;border-radius:50%;border:1.5px solid var(--border);display:flex;align-items:center;justify-content:center;cursor:pointer;background:#fff;transition:all .15s;}
.hbtn.yes{background:var(--green);border-color:var(--green);}
.hbtn.no{background:var(--red);border-color:var(--red);}

/* bmi */
.bmi-card{background:#fff;border-radius:14px;border:.5px solid var(--border);margin-bottom:10px;padding:14px;}
.bmi-inputs{display:flex;gap:10px;align-items:flex-end;margin-bottom:12px;}
.bmi-field{flex:1;}
.bmi-field label{display:block;font-size:10px;font-weight:600;color:var(--brown-light);letter-spacing:.04em;margin-bottom:5px;}
.bmi-field input{width:100%;background:var(--bg2);border:.5px solid var(--border);border-radius:8px;padding:9px 10px;font-size:15px;font-weight:600;color:var(--brown);text-align:center;font-family:inherit;}
.bmi-right{display:flex;flex-direction:column;align-items:center;gap:5px;min-width:56px;}
.bmi-num{font-size:22px;font-weight:700;color:var(--brown);line-height:1;}
.bmi-tag{font-size:11px;font-weight:600;padding:3px 10px;border-radius:20px;white-space:nowrap;}
.bmi-bar-track{height:6px;background:var(--border);border-radius:3px;overflow:hidden;}
.bmi-bar-fill{height:100%;border-radius:3px;width:0%;transition:width .4s,background .3s;}
.bmi-bar-labels{display:flex;justify-content:space-between;margin-top:4px;}
.bmi-bar-labels span{font-size:9px;color:var(--brown-light);}

/* note */
.note-wrap{background:#fff;border-radius:10px;border:.5px dashed var(--border);padding:12px;margin-bottom:10px;}
.note-wrap textarea{width:100%;border:none;background:transparent;resize:none;font-size:13px;color:var(--brown-mid);outline:none;font-family:inherit;}
.save-btn{width:100%;background:var(--coral);border:none;border-radius:12px;padding:14px;font-size:14px;font-weight:600;color:#fff;cursor:pointer;}

/* data */
.top-tabs{display:flex;margin:0 16px;background:var(--bg2);border-radius:20px;padding:3px;}
.ttab{flex:1;text-align:center;font-size:12px;padding:6px 0;border-radius:16px;color:var(--brown-mid);cursor:pointer;font-weight:500;border:none;background:transparent;}
.ttab.on{background:#fff;color:var(--brown);font-weight:600;}
.month-nav{display:flex;align-items:center;justify-content:space-between;padding:10px 16px;border-bottom:.5px solid var(--border);}
.month-nav span{font-size:13px;font-weight:600;color:var(--brown);}
.month-nav button{background:none;border:none;color:var(--coral);font-size:20px;cursor:pointer;padding:0 4px;}
.chart-card{background:#fff;border-radius:14px;border:.5px solid var(--border);padding:14px;margin-bottom:10px;}
.chart-title{font-size:13px;font-weight:600;color:var(--brown);margin-bottom:2px;}
.chart-sub{font-size:10px;color:var(--brown-light);margin-bottom:10px;}
.chart-legend{display:flex;gap:12px;margin-top:8px;}
.leg{display:flex;align-items:center;gap:5px;font-size:10px;color:var(--brown-mid);}
.leg-dot{width:8px;height:8px;border-radius:50%;}
.rings-row{display:flex;justify-content:space-around;align-items:center;padding:4px 0;}
.ring-item{display:flex;flex-direction:column;align-items:center;gap:6px;}
.ring-item span{font-size:11px;color:var(--brown-mid);text-align:center;max-width:64px;line-height:1.3;}

/* settings */
.set-section{font-size:11px;font-weight:600;color:var(--coral);letter-spacing:.05em;margin:14px 0 8px;}
.set-group{background:#fff;border-radius:14px;border:.5px solid var(--border);margin-bottom:8px;overflow:hidden;}
.set-parent{display:flex;align-items:center;justify-content:space-between;padding:11px 14px;}
.set-parent-label{display:flex;align-items:center;gap:8px;font-size:13px;font-weight:600;color:var(--brown);}
.cat-dot{width:8px;height:8px;border-radius:50%;}
.set-child{display:flex;align-items:center;justify-content:space-between;padding:8px 14px 8px 30px;border-top:.5px solid var(--bg2);}
.set-child-name{font-size:12px;color:var(--brown-mid);}
.ic-btn{background:none;border:none;color:var(--brown-light);font-size:14px;cursor:pointer;padding:0 4px;}
.add-btn{width:100%;background:var(--bg2);border:.5px dashed var(--border);border-radius:10px;padding:10px;font-size:12px;font-weight:600;color:var(--brown-mid);cursor:pointer;display:flex;align-items:center;justify-content:center;gap:6px;margin-bottom:8px;}

/* bottom nav - 固定位置 */
.bottom-nav{position:fixed;bottom:0;left:0;right:0;width:100%;display:flex;flex-direction:column;background:var(--bg);border-top:.5px solid var(--border);flex-shrink:0;z-index:1000;}
.bnav-row{display:flex;width:100%;}
.bnav-safe{height:env(safe-area-inset-bottom);height:constant(safe-area-inset-bottom);background:var(--bg);}
.bnav{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px;padding:6px 0;cursor:pointer;border:none;background:none;}
.bnav svg{width:22px;height:22px;}
.bnav span{font-size:10px;color:var(--brown-light);}
.bnav.on span{color:var(--coral);}

/* modal */
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(60,30,10,.45);z-index:100;align-items:center;justify-content:center;padding:20px;}
.modal-overlay.open{display:flex;}
.modal{background:#fff;border-radius:16px;padding:20px;width:100%;max-width:300px;}
.modal h3{font-size:15px;font-weight:600;color:var(--brown);margin-bottom:16px;}
.modal input{width:100%;background:var(--bg2);border:.5px solid var(--border);border-radius:8px;padding:10px 12px;font-size:14px;color:var(--brown);margin-bottom:10px;font-family:inherit;}
.modal-btns{display:flex;gap:8px;}
.modal-btns button{flex:1;padding:10px;border-radius:10px;border:none;font-size:13px;font-weight:600;cursor:pointer;}
.btn-cancel{background:var(--bg2);color:var(--brown-mid);}
.btn-confirm{background:var(--coral);color:#fff;}

/* toast */
.toast{display:none;position:fixed;bottom:calc(100px + env(safe-area-inset-bottom));left:50%;transform:translateX(-50%);background:rgba(60,30,10,.88);color:#fff;font-size:12px;padding:8px 18px;border-radius:20px;z-index:200;white-space:nowrap;}
.toast.show{display:block;}

/* sync status */
.sync-status{position:fixed;top:calc(10px + env(safe-area-inset-top));right:10px;font-size:10px;color:var(--brown-mid);background:rgba(255,255,255,.9);padding:4px 8px;border-radius:12px;z-index:999;}
.sync-status.syncing{color:var(--coral);}
.sync-status.success{color:var(--green);}
.sync-status.error{color:var(--red);}
</style>
</head>
<body>
<div class="phone" id="app">

<!-- SYNC STATUS -->
<div class="sync-status" id="sync-status">📱 在线</div>

<!-- HOME -->
<div class="screen active" id="s-home">
  <div class="hdr-coral">
    <div class="hdr-left">
      <div class="brand">小鱼健康</div>
      <div class="title">首页</div>
      <div class="sub">Hello，今天你变好了么？</div>
    </div>
    <div class="user-info">
      <div class="name">🐟 小鱼儿</div>
    </div>
  </div>
  <div class="week-strip" id="week-strip"></div>
  <div class="sbody">
    <div class="sec-label">体重 · BMI</div>
    <div class="bmi-card">
      <div class="bmi-inputs">
        <div class="bmi-field">
          <label>体重 KG</label>
          <input type="number" id="inp-weight" placeholder="65.0" step="0.1" oninput="calcBMI()">
        </div>
        <div class="bmi-field">
          <label>身高 CM</label>
          <input type="number" id="inp-height" placeholder="170" step="1" oninput="calcBMI()">
        </div>
        <div class="bmi-right">
          <div class="bmi-num" id="bmi-val">--</div>
          <div class="bmi-tag" id="bmi-tag" style="background:transparent;color:transparent;">-</div>
        </div>
      </div>
      <div class="bmi-bar-track"><div class="bmi-bar-fill" id="bmi-bar"></div></div>
      <div class="bmi-bar-labels">
        <span>偏轻 &lt;18.5</span><span>正常 18.5–24</span><span>偏重 24–28</span><span>肥胖 &gt;28</span>
      </div>
    </div>

    <!-- BMI 统计卡片 -->
    <div class="card" id="bmi-stats-card" style="display:none;">
      <div class="card-hdr">
        <div class="card-hdr-title">本周 BMI 统计</div>
      </div>
      <div class="card-body">
        <div style="display:flex;justify-content:space-around;align-items:center;padding:10px 0;">
          <div style="text-align:center;">
            <div style="font-size:24px;font-weight:700;color:var(--coral);" id="stats-bmi">--</div>
            <div style="font-size:11px;color:var(--brown-light);margin-top:4px;">BMI 指数</div>
          </div>
          <div style="text-align:center;">
            <div style="font-size:24px;font-weight:700;color:var(--brown);" id="stats-weight">--</div>
            <div style="font-size:11px;color:var(--brown-light);margin-top:4px;">体重 (KG)</div>
          </div>
          <div style="text-align:center;">
            <div style="font-size:24px;font-weight:700;color:var(--brown);" id="stats-height">--</div>
            <div style="font-size:11px;color:var(--brown-light);margin-top:4px;">身高 (CM)</div>
          </div>
        </div>
        <div style="margin-top:12px;padding:10px;background:var(--bg2);border-radius:8px;text-align:center;">
          <div style="font-size:12px;font-weight:600;color:var(--brown);" id="stats-category">--</div>
          <div style="font-size:10px;color:var(--brown-light);margin-top:4px;" id="stats-advice">请输入体重和身高</div>
        </div>
      </div>
    </div>

    <div class="sec-label">周健康状态</div>
    <div id="health-cards"></div>

    <div class="sec-label">养生计划打卡</div>
    <div class="card" id="habit-card"></div>

    <div class="sec-label">本周备注</div>
    <div class="note-wrap"><textarea id="week-note" rows="3" placeholder="记录本周身体感受…"></textarea></div>
    <button class="save-btn" onclick="saveWeek()">保存本周记录</button>
  </div>
</div>

<!-- DATA -->
<div class="screen" id="s-data">
  <div class="hdr-white"><div class="title">数据中心</div>
    <div style="margin-top:10px;"><div class="top-tabs">
      <button class="ttab on" onclick="switchDataTab('month',this)">本月</button>
      <button class="ttab" onclick="switchDataTab('year',this)">本年</button>
    </div></div>
  </div>
  <div class="month-nav">
    <button onclick="changeMonth(-1)">&#8249;</button>
    <span id="month-label"></span>
    <button onclick="changeMonth(1)">&#8250;</button>
  </div>
  <div class="sbody">
    <div class="sec-label">BMI 趋势</div>
    <div class="chart-card">
      <div class="chart-title">体重指数 · BMI</div>
      <div class="chart-sub">18.5–24 为正常区间</div>
      <div style="height:120px;"><canvas id="bmi-chart"></canvas></div>
    </div>
    <div class="sec-label">健康趋势</div>
    <div id="health-charts"></div>
    <div class="sec-label">习惯达成率</div>
    <div class="chart-card">
      <div class="chart-title">本月养生计划完成情况</div>
      <div class="chart-sub">完成次数 / 本月总周次</div>
      <div class="rings-row" id="habit-rings"></div>
    </div>
  </div>
</div>

<!-- SETTINGS -->
<div class="screen" id="s-settings">
  <div class="hdr-white"><div class="title">设置</div></div>
  <div class="sbody">
    <div class="set-section">账号信息</div>
    <div class="set-group">
      <div class="set-parent">
        <div class="set-parent-label">
          <div style="width:8px;height:8px;border-radius:50%;background:var(--coral);"></div>
          当前用户
        </div>
      </div>
      <div class="set-child">
        <span class="set-child-name">🐟 小鱼儿</span>
      </div>
    </div>
    <div class="set-group">
      <div class="set-parent">
        <div class="set-parent-label">
          <div style="width:8px;height:8px;border-radius:50%;background:var(--green);"></div>
          云端同步
        </div>
      </div>
      <div class="set-child">
        <span class="set-child-name" id="sync-info">已启用</span>
        <button class="ic-btn" onclick="syncNow()">🔄</button>
      </div>
    </div>

    <div class="set-section">健康记录项目</div>
    <div id="health-fields-settings"></div>
    <button class="add-btn" onclick="openModal('新增一级分类','addCat')">+ 新增一级分类</button>
    <div class="set-section">养生计划</div>
    <div class="set-group" id="habit-settings"></div>
    <button class="add-btn" onclick="openModal('新增养生计划','addHabit')">+ 新增养生计划</button>
  </div>
</div>

<!-- NAV -->
<div class="bottom-nav">
  <div class="bnav-row">
    <button class="bnav on" id="nav-home" onclick="navTo('home')">
      <svg viewBox="0 0 22 22" fill="none"><path d="M4 10L11 4l7 6v8h-5v-5H9v5H4v-8z" stroke="var(--coral)" stroke-width="1.4"/></svg>
      <span>首页</span>
    </button>
    <button class="bnav" id="nav-data" onclick="navTo('data')">
      <svg viewBox="0 0 22 22" fill="none"><polyline points="3,17 7,11 12,14 18,5" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/></svg>
      <span>数据</span>
    </button>
    <button class="bnav" id="nav-settings" onclick="navTo('settings')">
      <svg viewBox="0 0 22 22" fill="none"><circle cx="11" cy="9" r="3.5" stroke="currentColor" stroke-width="1.3"/><path d="M4 19c0-3.9 3.1-7 7-7s7 3.1 7 7" stroke="currentColor" stroke-width="1.3" stroke-linecap="round"/></svg>
      <span>设置</span>
    </button>
  </div>
  <div class="bnav-safe"></div>
</div>

<!-- MODAL -->
<div class="modal-overlay" id="modal-overlay">
  <div class="modal">
    <h3 id="modal-title"></h3>
    <input type="text" id="modal-input" placeholder="请输入名称">
    <div class="modal-btns">
      <button class="btn-cancel" onclick="closeModal()">取消</button>
      <button class="btn-confirm" onclick="confirmModal()">确定</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>
</div>

<script>

async function syncFromCloud(){

    // 兼容新旧格式

    if(!cloud) {

    // 检查是否有有效业务数据

    const hasHabits = cloud.habits && cloud.habits.length > 0;

// WEEKS - 2026年自然周
function buildWeeks(){
  // 生成2026年所有自然周（周一到周日）
  const year = 2026;
  let weeks = [];
  
  // 找到2026年第一个周一
  let firstDay = new Date(year, 0, 1);
  let firstMonday = new Date(firstDay);
  
  // 调整到第一个周一
  let dayOfWeek = firstDay.getDay();
  if (dayOfWeek === 0) {
    firstMonday.setDate(firstDay.getDate() + 1);
  } else if (dayOfWeek !== 1) {
    firstMonday.setDate(firstDay.getDate() + (8 - dayOfWeek));
  }
  
  // 生成所有周
  let currentWeek = new Date(firstMonday);
  let weekNum = 1;
  
  while (currentWeek.getFullYear() === year || 
         (currentWeek.getFullYear() === year + 1 && currentWeek.getMonth() === 0 && currentWeek.getDate() <= 7)) {
    let weekStart = new Date(currentWeek);
    let weekEnd = new Date(currentWeek);
    weekEnd.setDate(weekEnd.getDate() + 6);
    
    let fmt = n => n.toString().padStart(2, '0');
    weeks.push({
      id: weekNum,
      label: `W${weekNum}`,
      fullLabel: `W${weekNum} ${fmt(weekStart.getMonth()+1)}/${fmt(weekStart.getDate())}-${fmt(weekEnd.getMonth()+1)}/${fmt(weekEnd.getDate())}`,
      start: weekStart,
      end: weekEnd,
      key: `w${weekNum}`
    });
    
    currentWeek.setDate(currentWeek.getDate() + 7);
    weekNum++;
  }
  
  state.weeks = weeks;
  
  // 找到当前周
  let today = new Date();
  let currentYear = today.getFullYear();
  
  if (currentYear === year) {
    // 找到包含今天的周
    let found = weeks.findIndex(w => today >= w.start && today <= w.end);
    if (found !== -1) {
      state.currentWeek = found;
    } else {
      state.currentWeek = weeks.length - 1; // 默认最后一周
    }
  } else if (currentYear > year) {
    // 如果已经过了2026年，显示最后一周
    state.currentWeek = weeks.length - 1;
  } else {
    // 如果还没到2026年，显示第一周
    state.currentWeek = 0;
  }
}

    let dateRange = `${fmt(w.start.getMonth()+1)}/${fmt(w.start.getDate())}-${fmt(w.end.getDate())}`;

function calcBMI(){

  let w=parseFloat(wEl.value);
  let h=parseFloat(hEl.value);
  let r=rec();
  r.weight=wEl.value;
  r.height=hEl.value;
  saveUserData();
  updateBMIDisplay(w, h);
}

function updateBMIDisplay(w, h){
  let valEl=document.getElementById('bmi-val');
  let tagEl=document.getElementById('bmi-tag');
  let barEl=document.getElementById('bmi-bar');
  if(!valEl||!tagEl||!barEl)return;
  if(!w||!h||h<50||w<10){
    valEl.textContent='--';
    tagEl.textContent='-';
    tagEl.style.background='transparent';
    tagEl.style.color='transparent';
    barEl.style.width='0%';
    return;
  }
  let bmi=w/((h/100)**2);
  valEl.textContent=bmi.toFixed(1);
  let pct=Math.min(96,Math.max(2,(bmi-14)/22*100));
  barEl.style.width=pct+'%';
  let cfg;
  if(bmi<18.5)    cfg={bar:'#378ADD',bg:'#E6F1FB',fg:'#185FA5',txt:'偏轻'};
  else if(bmi<24) cfg={bar:'#2E7D52',bg:'#E4F4EB',fg:'#2E7D52',txt:'正常'};
  else if(bmi<28) cfg={bar:'#BA7517',bg:'#FFF3DC',fg:'#8B5D00',txt:'偏重'};
  else            cfg={bar:'#C0392B',bg:'#FDEAEA',fg:'#C0392B',txt:'肥胖'};
  barEl.style.background=cfg.bar;
  tagEl.textContent=cfg.txt;
  tagEl.style.background=cfg.bg;
  tagEl.style.color=cfg.fg;
}

      let el=document.getElementById('hc-'+f.id);
      if(!el)return;
      let vals = displayWeeks.map(w => state.records[w.key]?.health[f.id] || 0);
      let improving = vals[vals.length-1] <= vals[0];
      let color = improving ? '#2E7D52' : '#E24B4A';
      let ch = new Chart(el.getContext('2d'), {
        type: 'line',
        data: {
          labels, 
          datasets: [{
            data: vals, 
            borderColor: color, 
            backgroundColor: color + '18', 
            borderWidth: 2, 
            pointRadius: 3, 
            pointBackgroundColor: color, 
            tension: .4, 
            fill: true
          }]
        },
        options: {
          responsive: true, 
          maintainAspectRatio: false, 
          plugins: {legend: {display: false}},
          scales: {
            y: {min: .5, max: 4.5, ticks: {stepSize: 1, callback: v => ({1:'佳',2:'轻',3:'重',4:'差'}[v]||''), font: {size: 9}}, grid: {color: 'rgba(200,150,120,.1)'}},
            x: {ticks: {font: {size: 9}}, grid: {display: false}}
          }
        }
      });
      state.healthCharts.push(ch);
    });
  });
}

function renderHabitRings(){
  let c=document.getElementById('habit-rings');
  let total = state.weeks.length;
  c.innerHTML = state.habits.map(h => {
    // 计算所有周的完成率
    let done = state.weeks.reduce((s, w) => s + (state.records[w.key]?.habits[h.id] === 1 ? 1 : 0), 0);
    let pct = total ? Math.round(done/total*100) : 0;
    let circ = 2*Math.PI*22;
    let filled = (circ*pct/100).toFixed(1);
    let empty = (circ-filled).toFixed(1);
    let color = pct >= 70 ? '#2E7D52' : pct >= 40 ? '#BA7517' : '#E24B4A';
    let label = h.name.length > 6 ? h.name.slice(0,6)+'…' : h.name;
    return `<div class="ring-item">
      <svg width="64" height="64" viewBox="0 0 64 64">
        <circle cx="32" cy="32" r="22" fill="none" stroke="#F0E5DA" stroke-width="7"/>
        <circle cx="32" cy="32" r="22" fill="none" stroke="${color}" stroke-width="7"
          stroke-dasharray="${filled} ${empty}" stroke-linecap="round" transform="rotate(-90 32 32)"/>
        <text x="32" y="37" text-anchor="middle" font-size="13" font-weight="600" fill="${color}">${pct}%</text>
      </svg>
      <span>${label}</span>
    </div>`;
  }).join('');
}

// SETTINGS
function renderSettings(){
  let c=document.getElementById('health-fields-settings');
  c.innerHTML='';
  state.categories.forEach(cat=>{
    let color=CAT_COLORS[cat.name]||'var(--coral)';
    let div=document.createElement('div');
    div.className='set-group';
    div.innerHTML=`<div class="set-parent">
      <div class="set-parent-label"><div class="cat-dot" style="background:${color};"></div>${cat.name}</div>
      <div>
        <button class="ic-btn" onclick="openModal('新增字段','addField','${cat.id}')">+</button>
        <button class="ic-btn" onclick="deleteCat('${cat.id}')">⌫</button>
      </div>
    </div>`+cat.fields.map(f=>`<div class="set-child">
      <span class="set-child-name">${f.name}</span>
      <div>
        <button class="ic-btn" onclick="openModal('编辑字段','editField','${cat.id}','${f.id}','${f.name}')">✎</button>
        <button class="ic-btn" onclick="deleteField('${cat.id}','${f.id}')">⌫</button>
      </div>
    </div>`).join('');
    c.appendChild(div);
  });
  document.getElementById('habit-settings').innerHTML=state.habits.map(h=>`
    <div class="habit-row" style="border-top:.5px solid var(--bg2);">
      <span class="habit-name">${h.name}</span>
      <div>
        <button class="ic-btn" onclick="openModal('编辑计划','editHabit',null,'${h.id}','${h.name}')">✎</button>
        <button class="ic-btn" onclick="deleteHabit('${h.id}')">⌫</button>
      </div>
    </div>`).join('');
}

// MODAL
let _mAction=null,_mCatId=null,_mFid=null;
function openModal(title,action,catId,fid,curVal){
  _mAction=action;_mCatId=catId||null;_mFid=fid||null;
  document.getElementById('modal-title').textContent=title;
  document.getElementById('modal-input').value=curVal||'';
  document.getElementById('modal-overlay').classList.add('open');
  setTimeout(()=>document.getElementById('modal-input').focus(),100);
}
function closeModal(){document.getElementById('modal-overlay').classList.remove('open');}
function confirmModal(){
  let val=document.getElementById('modal-input').value.trim();
  if(!val)return;
  if(_mAction==='addCat'){
    state.categories.push({id:'c'+Date.now(),name:val,fields:[]});
  } else if(_mAction==='addField'){
    let cat=state.categories.find(c=>c.id===_mCatId);
    if(cat)cat.fields.push({id:'f'+Date.now(),name:val});
  } else if(_mAction==='editField'){
    let cat=state.categories.find(c=>c.id===_mCatId);
    if(cat){let f=cat.fields.find(f=>f.id===_mFid);if(f)f.name=val;}
  } else if(_mAction==='addHabit'){
    state.habits.push({id:'h'+Date.now(),name:val});
  } else if(_mAction==='editHabit'){
    let h=state.habits.find(h=>h.id===_mFid);if(h)h.name=val;
  }
  closeModal();
  saveUserData();
  renderSettings();
  renderHealthCards();
  renderHabitCard();
  showToast('已保存');
}
function deleteCat(id){
  state.categories=state.categories.filter(c=>c.id!==id);
  saveUserData();
  renderSettings();renderHealthCards();showToast('已删除');
}
function deleteField(cid,fid){
  let cat=state.categories.find(c=>c.id===cid);
  if(cat)cat.fields=cat.fields.filter(f=>f.id!==fid);
  saveUserData();
  renderSettings();renderHealthCards();showToast('已删除');
}
function deleteHabit(id){
  state.habits=state.habits.filter(h=>h.id!==id);
  saveUserData();
  renderSettings();renderHabitCard();showToast('已删除');
}

function showToast(msg){
  let t=document.getElementById('toast');
  t.textContent=msg;t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),2000);
}

// INIT
function init(){
  console.log('🚀 应用初始化...');
  
  // 1. 先加载本地数据
  loadUserData();
  
  // 2. 初始化 UI
  buildWeeks();
  renderWeekStrip();
  updateMonthLabel();
  
  // 3. 网络监听
  window.addEventListener('online', () => {
    updateSyncStatus('online', '📱 在线');
    syncToCloud();
  });
  
  window.addEventListener('offline', () => {
    updateSyncStatus('error', '📵 离线');
  });
  
  // 4. 如果在线，先从云端拉取最新数据，再同步本地
  if(navigator.onLine) {
    updateSyncStatus('syncing', '🔄 同步中...');
    syncFromCloud().then(updated => {
      if(updated) {
        // 云端数据更新了，重新渲染
        buildWeeks();
        renderWeekStrip();
        updateMonthLabel();
      }
      // 无论如何都上传一次本地数据（确保最新）
      syncToCloud();
    });
  } else {
    updateSyncStatus('error', '📵 离线');
  }
  
  // 5. 定时自动同步 (每 5 分钟)
  setInterval(() => {
    if(navigator.onLine) syncToCloud();
  }, 300000);
  
  console.log('✅ 应用初始化完成');
}

init();

// 注册 Service Worker
if ('serviceWorker' in navigator) {
  window.addEventListener('load', async () => {
    try {
      const registration = await navigator.serviceWorker.register('./sw.js');
      console.log('✅ Service Worker 注册成功:', registration.scope);
      
      // 检查更新
      registration.addEventListener('updatefound', () => {
        const newWorker = registration.installing;
        newWorker.addEventListener('statechange', () => {
          if (newWorker.state === 'installed' && navigator.serviceWorker.controller) {
            // 新版本可用
            showUpdateNotification();
          }
        });
      });
    } catch (error) {
      console.error('❌ Service Worker 注册失败:', error);
    }
  });
}

// 显示更新通知
function showUpdateNotification() {
  showToast('🎉 新版本可用，刷新页面即可更新');
}

// PWA 安装提示
let deferredPrompt;

window.addEventListener('beforeinstallprompt', (e) => {
  e.preventDefault();
  deferredPrompt = e;
  
  // 显示自定义安装按钮（3秒后）
  setTimeout(() => {
    showInstallButton();
  }, 3000);
});

function showInstallButton() {
  // 检查是否已安装
  if (window.matchMedia('(display-mode: standalone)').matches) {
    return;
  }
  
  // 检查是否已拒绝安装
  if (localStorage.getItem('pwa-install-dismissed')) {
    return;
  }
  
  const installBtn = document.createElement('button');
  installBtn.className = 'pwa-install-btn';
  installBtn.innerHTML = '📱 安装到主屏幕';
  installBtn.onclick = installApp;
  
  const closeBtn = document.createElement('button');
  closeBtn.innerHTML = '×';
  closeBtn.className = 'pwa-install-close';
  closeBtn.onclick = (e) => {
    e.stopPropagation();
    installBtn.remove();
    localStorage.setItem('pwa-install-dismissed', 'true');
  };
  
  installBtn.appendChild(closeBtn);
  document.body.appendChild(installBtn);
}

async function installApp() {
  if (!deferredPrompt) return;
  
  deferredPrompt.prompt();
  const { outcome } = await deferredPrompt.userChoice;
  
  if (outcome === 'accepted') {
    console.log('✅ 用户安装了应用');
    showToast('🎉 应用已安装到主屏幕');
  }
  
  deferredPrompt = null;
  
  // 移除安装按钮
  const btn = document.querySelector('.pwa-install-btn');
  if (btn) btn.remove();
}

// 检测是否已安装
window.addEventListener('appinstalled', () => {
  console.log('✅ 应用已安装');
  const btn = document.querySelector('.pwa-install-btn');
  if (btn) btn.remove();
});
</script>
